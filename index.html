<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rapido - Every Rainy Commute Has a Story</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,400;0,600;0,700&display=swap" rel="stylesheet">
    
    <style>
        /* CSS Reset & General Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: #1a1a1a; /* Dark background outside the container for desktop view */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Mobile Container Simulation */
        .app-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            background: url('bg.jpg') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: clamp(20px, 4vh, 40px) 15px;
            overflow: hidden;
            color: #ffffff;
        }

        /* Logo */
        .logo {
            height: clamp(30px, 8vw, 40px);
            margin-bottom: clamp(15px, 3vh, 25px);
        }

        /* Headline Section */
        .headline-section {
            text-align: center;
            margin-bottom: clamp(10px, 2vh, 15px);
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .text-copy {
            width: 85%;
            max-width: 280px;
            height: auto;
        }

        /* Timeline Section */
        .timeline-container {
            position: relative;
            width: 90%;
            max-width: 350px;
            margin-bottom: clamp(15px, 3vh, 25px);
            padding-bottom: 25px;
        }

        .timeline-track {
            position: absolute;
            top: 35px; 
            left: 5%;
            right: 5%;
            height: 2px;
            background-color: rgba(255, 255, 255, 0.5);
            z-index: 1;
        }

        .timeline-progress {
            position: absolute;
            top: 35px;
            left: 5%;
            height: 2px;
            width: 0%; 
            background-color: #fccc04;
            z-index: 2;
            transition: width 0.4s ease-in-out;
        }

        .timeline-nodes {
            display: flex;
            justify-content: space-between;
            position: relative;
            z-index: 3;
        }

        .timeline-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 60px;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s ease-in-out;
            -webkit-tap-highlight-color: transparent; 
        }

        .timeline-node:hover {
            transform: scale(1.1);
        }

        .year {
            font-size: clamp(14px, 4vw, 16px);
            font-weight: 600;
            margin-bottom: 10px;
        }

        .dot {
            width: clamp(10px, 3vw, 12px);
            height: clamp(10px, 3vw, 12px);
            border-radius: 50%;
            background-color: #ffffff;
            transition: background-color 0.4s, box-shadow 0.3s;
        }

        .timeline-node:hover .dot {
            box-shadow: 0 0 8px rgba(252, 204, 4, 0.8);
        }

        .period {
            position: absolute;
            top: 45px;
            font-size: clamp(18px, 5vw, 22px);
            font-weight: 700;
            font-style: italic;
            opacity: 0;
            transition: opacity 0.3s;
            white-space: nowrap;
            color: #FFCA20;
        }

        /* Main Image & Rain Wrapper Frame */
        .frame-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: clamp(15px, 3vh, 25px);
            flex-grow: 1; /* Allows it to take available space on taller screens */
            max-height: 50vh;
        }

        .frame-wrapper {
            position: relative;
            width: 95%;
            max-width: 400px;
            border-radius: clamp(15px, 5vw, 22px);
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            background: #000;
        }

        /* Nostalgia Transition Effects */
        #main-frame {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
            transition: opacity 0.4s ease-in-out, filter 0.4s ease-in-out;
            filter: sepia(0%) blur(0px); 
        }

        .nostalgic-effect {
            opacity: 0.4 !important;
            filter: sepia(80%) blur(3px) contrast(110%) !important;
        }

        #rain-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        /* Bottom Controls */
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: clamp(15px, 3vh, 20px);
        }

        .nav-btn {
            background: transparent;
            border: 1px solid #ffffff;
            color: #ffffff;
            width: clamp(35px, 10vw, 40px);
            height: clamp(35px, 10vw, 40px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(16px, 5vw, 18px);
            cursor: pointer;
            transition: background 0.3s, opacity 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        .nav-btn:hover, .nav-btn:active {
            background: rgba(255, 255, 255, 0.2);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            background: transparent;
        }

        .nav-dots {
            display: flex;
            gap: 8px;
        }

        .nav-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.4);
            transition: background-color 0.3s;
        }

        /* CTA Button */
        .cta-container {
            display: flex;
            justify-content: center;
            width: 100%;
            min-height: 50px; /* Prevents layout jump when button appears */
        }

        #cta-btn {
            width: 85%;
            max-width: 280px;
            display: none; 
            cursor: pointer;
            animation: fadeIn 0.5s ease-in;
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        #cta-btn img {
            width: 100%;
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Small screen adjustments */
        @media (max-height: 650px) {
            .app-container {
                padding: 15px 10px;
            }
            .timeline-container {
                padding-bottom: 15px;
            }
            .period {
                top: 40px;
            }
        }
    </style>
    <!-- Microsoft Clarity -->
    <script type="text/javascript">
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "xgpscakmok");
    </script>
</head>
<body>

    <div class="app-container">
        <audio id="bg-music" src="music.mp3" loop autoplay></audio>

        <img src="rapido_logo.png" alt="Rapido Logo" class="logo">

        <div class="headline-section">
            <img src="Text_RC_LC_3JUL.png" alt="commute has a story." class="text-copy">
        </div>

        <div class="timeline-container">
            <div class="timeline-track"></div>
            <div class="timeline-progress" id="progress-bar"></div>
            
            <div class="timeline-nodes">
                <div class="timeline-node" onclick="jumpToStep(0)">
                    <span class="year">2005</span>
                    <div class="dot" id="timeline-dot-0"></div>
                    <span class="period" id="period-0">School</span>
                </div>
                <div class="timeline-node" onclick="jumpToStep(1)">
                    <span class="year">2012</span>
                    <div class="dot" id="timeline-dot-1"></div>
                    <span class="period" id="period-1">College</span>
                </div>
                <div class="timeline-node" onclick="jumpToStep(2)">
                    <span class="year">2026</span>
                    <div class="dot" id="timeline-dot-2"></div>
                    <span class="period" id="period-2">Now</span>
                </div>
            </div>
        </div>

        <div class="frame-container">
            <div class="frame-wrapper">
                <img src="Frame1_RC_LC_3JUL.png" id="main-frame" alt="Commute Story Frame">
                <canvas id="rain-canvas"></canvas>
            </div>
        </div>

        <div class="controls">
            <button class="nav-btn" id="prev-btn" onclick="navigate(-1)">&#10094;</button>
            <div class="nav-dots">
                <div class="nav-dot" id="bottom-dot-0"></div>
                <div class="nav-dot" id="bottom-dot-1"></div>
                <div class="nav-dot" id="bottom-dot-2"></div>
            </div>
            <button class="nav-btn" id="next-btn" onclick="navigate(1)">&#10095;</button>
        </div>

        <div class="cta-container">
            <a href="https://m.rapido.cc/Ewte/wi3v7ayi" target="_blank" id="cta-btn" onclick="logEvent('cta_clicked')">
                <img src="CTA_RC_LC_3JUL.png" alt="Be Ride-ready for Rainy Days!">
            </a>
        </div>
    </div>

    <script>
        /* ================= TRACKING ================= */
        const SHEET_URL = "https://script.google.com/macros/s/AKfycbzw_rcab_Yo4WLqOMiRj2kgKnuMZruCATQwHhN4cMgpHhcE7z8GHzbsoVji-LjKVcFHCw/exec";
        const CAMPAIGN = "monsoon_2025";
        const uid = new URLSearchParams(window.location.search).get('uid') || 'unknown';

        /* pass uid into Clarity so recordings are identifiable */
        if (window.clarity) {
            clarity("set", "uid", uid);
            clarity("set", "campaign", CAMPAIGN);
        }

        function logEvent(eventName) {
            /* mirror into Clarity for filtering recordings */
            if (window.clarity) {
                clarity("event", eventName);
            }
            try {
                fetch(SHEET_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        timestamp: new Date().toLocaleString('en-IN', {timeZone: 'Asia/Kolkata'}),
                        uid: uid,
                        campaign: CAMPAIGN,
                        event: eventName,
                        device: /Mobi|Android/i.test(navigator.userAgent) ? "mobile" : "desktop"
                    })
                });
            } catch(e) {}
        }

        const stepTracked = {};
        const stepNames = ["step1_school_2005", "step2_college_2012", "step3_now_2026"];
        function trackStepView(stepIndex) {
            const eventName = stepNames[stepIndex] || ("step" + (stepIndex + 1));
            if (stepTracked[eventName]) return;
            stepTracked[eventName] = true;
            logEvent(eventName);
        }

        logEvent("page_landed");

        // --- Music Controls Logic ---
        const bgMusic = document.getElementById('bg-music');

        document.body.addEventListener('click', function() {
            if (bgMusic.paused) {
                bgMusic.play();
            }
        }, { once: true });
        // ----------------------------

        const stepsData = [
            { id: 0, image: "Frame1_RC_LC_3JUL.png" },     
            { id: 1, image: "Frame2_RC_LC_3JUL.png" },   
            { id: 2, image: "Frame3_RC_LC_3JUL.png" }        
        ];

        let currentStep = 0;
        const maxStep = stepsData.length - 1;
        const progressWidths = ['0%', '50%', '100%'];
        const activeColor = '#fccc04';

        function navigate(direction) {
            let nextStep = currentStep + direction;
            if (nextStep < 0 || nextStep > maxStep) return;
            currentStep = nextStep;
            updateUI(false);
        }

        function jumpToStep(stepIndex) {
            if (stepIndex === currentStep) return;
            currentStep = stepIndex;
            updateUI(false);
        }

        function updateUI(isInitialLoad = false) {
            const mainFrame = document.getElementById('main-frame');

            trackStepView(currentStep);
            
            if (isInitialLoad) {
                mainFrame.src = stepsData[currentStep].image;
            } else {
                mainFrame.classList.add('nostalgic-effect');
                setTimeout(() => {
                    mainFrame.src = stepsData[currentStep].image;
                    mainFrame.classList.remove('nostalgic-effect');
                }, 400);
            }

            document.getElementById('progress-bar').style.width = progressWidths[currentStep];

            for (let i = 0; i <= maxStep; i++) {
                const timelineDot = document.getElementById(`timeline-dot-${i}`);
                const periodText = document.getElementById(`period-${i}`);
                
                if (i <= currentStep) {
                    timelineDot.style.backgroundColor = activeColor;
                } else {
                    timelineDot.style.backgroundColor = '#ffffff';
                }

                if (i === currentStep) {
                    periodText.style.opacity = '1';
                } else {
                    periodText.style.opacity = '0';
                }
            }

            for (let i = 0; i <= maxStep; i++) {
                const bottomDot = document.getElementById(`bottom-dot-${i}`);
                if (i === currentStep) {
                    bottomDot.style.backgroundColor = activeColor;
                } else {
                    bottomDot.style.backgroundColor = 'rgba(255, 255, 255, 0.4)';
                }
            }

            document.getElementById('prev-btn').disabled = (currentStep === 0);
            document.getElementById('next-btn').disabled = (currentStep === maxStep);

            const ctaBtn = document.getElementById('cta-btn');
            if (currentStep === maxStep) {
                let delay = isInitialLoad ? 0 : 400;
                setTimeout(() => {
                    ctaBtn.style.display = 'block';
                }, delay);
            } else {
                ctaBtn.style.display = 'none';
            }
        }

        // --- Rain Animation Logic ---
        const canvas = document.getElementById('rain-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let drops = [];
        const maxDrops = 180; // Slightly reduced for better mobile performance

        function initDrops() {
            drops = [];
            for (let i = 0; i < maxDrops; i++) {
                drops.push({
                    x: Math.random() * width,
                    y: Math.random() * height - height,
                    length: Math.random() * 15 + 10,
                    speed: Math.random() * 7 + 6,
                    opacity: Math.random() * 0.25 + 0.15
                });
            }
        }

        function resizeCanvas() {
            width = canvas.width = canvas.offsetWidth;
            height = canvas.height = canvas.offsetHeight;
            initDrops(); // Re-initialize drops to fit new responsive bounds properly
        }

        window.addEventListener('resize', resizeCanvas);
        document.getElementById('main-frame').addEventListener('load', resizeCanvas);
        
        // Initial setup timeout to ensure layout has calculated
        setTimeout(resizeCanvas, 100);

        function animateRain() {
            ctx.clearRect(0, 0, width, height);
            
            for (let i = 0; i < drops.length; i++) {
                const d = drops[i];
                
                ctx.beginPath();
                ctx.strokeStyle = `rgba(180, 215, 255, ${d.opacity})`;
                ctx.lineWidth = 1.2;
                ctx.moveTo(d.x, d.y);
                ctx.lineTo(d.x + (d.speed * 0.01), d.y + d.length);
                ctx.stroke();

                d.y += d.speed;
                d.x += d.speed * 0.01;

                if (d.y > height || d.x > width) {
                    d.y = -d.length;
                    d.x = Math.random() * width;
                    d.speed = Math.random() * 7 + 6;
                }
            }
            requestAnimationFrame(animateRain);
        }

        updateUI(true);
        animateRain();
    </script>
</body>
</html>
